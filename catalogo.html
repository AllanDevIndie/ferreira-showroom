<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Digital - Comercial Ferreira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos específicos para o catálogo dinâmico */
        .img-container { width: 100%; height: 250px; overflow: hidden; background: #eee; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .produto-card:hover .img-container img { transform: scale(1.1); }
        
        .filtros { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-btn { padding: 10px 20px; border: 2px solid var(--primary); background: transparent; color: var(--black); font-weight: 700; border-radius: 5px; cursor: pointer; transition: var(--transition); text-transform: uppercase; font-size: 0.7rem; }
        .filter-btn.active, .filter-btn:hover { background-color: var(--primary); color: var(--black); }
        
        .produto-tag { background-color: var(--primary); color: var(--black); padding: 3px 8px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; border-radius: 3px; margin-bottom: 10px; display: inline-block; }
        .detalhes { font-size: 0.85rem; color: #666; margin-bottom: 15px; }
        .detalhes span { display: block; margin-bottom: 3px; }
        
        .btn-pedir { display: block; background-color: #25D366; color: white; text-align: center; padding: 12px; text-decoration: none; border-radius: 8px; font-weight: 700; transition: var(--transition); }
        .btn-pedir:hover { background-color: #128C7E; }
        .search-wrap { text-align: center; margin-bottom: 20px; }
        .search-bar { width: 320px; max-width: 90%; padding: 10px 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 0.95rem; outline: none; transition: box-shadow .15s ease; }
        .search-bar:focus { box-shadow: 0 0 0 3px rgba(37,211,102,0.12); border-color: #25D366; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">COMERCIAL <span>FERREIRA</span></a>
        <div class="nav-links">
            <a href="index.html" style="color: white; text-decoration: none; font-size: 0.8rem;">VOLTAR</a>
        </div>
    </nav>

    <div class="container" style="padding: 40px 5%;">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="text-transform: uppercase; font-size: 2rem;">Catálogo Digital Inteligente</h1>
            <p>Atualizado em tempo real via Cloud Sheets</p>
        </div>

        <div class="search-wrap">
            <input id="search-categories" class="search-bar" type="search" placeholder="Pesquisar tipo ou nome do produto...">
        </div>

        <div class="filtros">
            <!-- O JS vai preencher aqui sozinho -->
        </div>


        <div class="grid-catalogo" id="grid-catalogo">
            <!-- Os produtos serão carregados aqui automaticamente -->
            <div style="text-align: center; grid-column: 1/-1; padding: 50px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary);"></i>
                <p style="margin-top: 15px;">Carregando novidades...</p>
            </div>
        </div>
    </div>

    <footer>
        Sistema de Catálogo Inteligente DEV ALBK <br>
        Conectado via Google Sheets &copy; 2026
    </footer>

    <script src="js/catalogo.js"></script>
</body>
</html>
