<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento - Comercial Ferreira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #E7C833;
            --dark: #1A1A1A;
            --black: #000000;
            --white: #FFFFFF;
            --gray: #F4F4F4;
            --whatsapp: #25D366;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--gray);
            color: var(--dark);
        }

        header {
            background-color: var(--black);
            padding: 40px 20px;
            text-align: center;
            color: var(--white);
        }

        .logo {
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 800;
            text-decoration: none;
            text-transform: uppercase;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .intro {
            text-align: center;
            margin-bottom: 40px;
        }

        .vendedor-card {
            background-color: var(--white);
            border-radius: 15px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: var(--transition);
            border: 2px solid transparent;
        }

        .vendedor-card:hover {
            border-color: var(--primary);
            transform: scale(1.02);
        }

        .vendedor-card.destaque {
            border: 2px solid var(--primary);
            background: linear-gradient(to right, var(--white), #fffdf2);
        }

        .avatar {
            width: 80px;
            height: 80px;
            background-color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--black);
            flex-shrink: 0;
        }

        .info {
            flex-grow: 1;
        }

        .info h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .info p {
            font-size: 0.85rem;
            color: #666;
        }

        .btn-whatsapp {
            background-color: var(--whatsapp);
            color: var(--white);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.5rem;
            transition: var(--transition);
        }

        .btn-whatsapp:hover {
            transform: rotate(15deg) scale(1.1);
            background-color: #128C7E;
        }

        .badge {
            background-color: var(--primary);
            color: var(--black);
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 5px;
        }

        .voltar-home {
            text-align: center;
            margin-top: 30px;
            font-size: 2rem;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: #999;
        }

        footer a {
            color: var(--primary);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">COMERCIAL <span>FERREIRA</span></a>
        <p style="margin-top: 10px; opacity: 0.8;">Atendimento Rápido e Especializado</p>
    </header>

    <div class="container">
        <div class="intro">
            <h2>Com quem deseja falar?</h2>
            <p>Nossas consultoras estão prontas para te enviar orçamentos e fotos das novidades.</p>
        </div>

        <!-- Vendedores (Placeholders) -->
        <div class="vendedor-card">
            <div class="avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="info">
                <h3>Maria Eduarda</h3>
                <p>Atendimento Geral</p>
            </div>
            <a href="https://wa.me/558173142897?text=Ol%C3%A1%20Maria%20Eduarda%2C%20vim%20pelo%20site%20da%20Comercial%20Ferreira%20e%20gostaria%20de%20um%20or%C3%A7amento." class="btn-whatsapp" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp Maria Eduarda">
                <i class="fa-brands fa-whatsapp"></i>
            </a>
        </div>

        <div class="vendedor-card">
            <div class="avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="info">
                <h3>Emily</h3>
                <p>Atendimento Geral</p>
            </div>
            <a href="https://wa.me/558189927012?text=Ol%C3%A1%20Emily%2C%20vim%20pelo%20site%20da%20Comercial%20Ferreira%20e%20gostaria%20de%20um%20or%C3%A7amento." class="btn-whatsapp" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp Emily">
                <i class="fa-brands fa-whatsapp"></i>
            </a>
        </div>
    </div>
    <div class="voltar-home">
        <button>
            <a href="index.html" style="color: var(--dark); text-decoration: none;"><strong>Voltar para Home</strong></a>
        </button>
    </div>

    <footer>
        Desenvolvido por <a href="https://devalbk.com.br" target="_blank"><strong>DEV ALBK</strong></a>
    </footer>
</body>
</html>
